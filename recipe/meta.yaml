{% set version = "3.4.0" %}

package:
  name: eigen
  version: {{ version }}

source:
  fn: eigen-{{ version }}.tar.gz
  url: https://gitlab.com/libeigen/eigen/-/archive/{{ version }}/eigen-{{ version }}.tar.gz
  sha256: 8586084f71f9bde545ee7fa6d00288b264a2b7ac3607b974e54d13e7162c1c72

build:
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - ninja

test:
  requires:
    - {{ compiler('cxx') }}
  files:
    - test.cc
  commands:  # [win]
    - if not exist %PREFIX%\\Library\\include\\eigen3 exit 1  # [win]
    - if not exist %PREFIX%\\Library\\share\\pkgconfig\\eigen3.pc exit 1  # [win]

about:
  home: https://eigen.tuxfamily.org/
  license: MPL-2.0
  license_family: Other
  license_file: COPYING.MPL2
  summary: "Eigen is a C++ template library for linear algebra: matrices, vectors, numerical solvers, and related algorithms."
  description: "Eigen is a C++ template library for linear algebra: matrices, vectors, numerical solvers, and related algorithms."
  dev_url: https://gitlab.com/libeigen/eigen
  doc_url: https://eigen.tuxfamily.org/dox/
